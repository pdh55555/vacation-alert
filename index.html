<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#185FA5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="휴가알림">
  <title>휴가 알림</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f2f4f7; color: #1a1a1a; font-size: 18px; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
    button { font-family: inherit; font-size: 18px; cursor: pointer; }
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:18px; }
    .spinner { width:42px; height:42px; border:4px solid #d5dde8; border-top-color:#185FA5; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size:17px; color:#777; }
    .wrap { max-width:480px; margin:0 auto; min-height:100vh; background:#fff; display:flex; flex-direction:column; }
    #login-screen { display:none; flex-direction:column; padding:28px 22px; gap:18px; }
    #login-screen .logo { font-size:26px; font-weight:800; color:#185FA5; text-align:center; margin-top:24px; }
    #login-screen .sub { font-size:17px; color:#666; text-align:center; }
    .label { font-size:17px; font-weight:700; color:#333; margin-bottom:6px; }
    #emp-search, #pw-input, #sabun-input, #sabun-pw { width:100%; padding:16px; border:2px solid #d5dde8; border-radius:14px; font-size:19px; outline:none; min-height:56px; }
    #emp-search:focus, #pw-input:focus, #sabun-input:focus, #sabun-pw:focus { border-color:#185FA5; }
    #emp-list { max-height:300px; overflow-y:auto; border:2px solid #eef1f5; border-radius:14px; margin-top:8px; }
    #emp-list:empty { display:none; }
    .emp-item { padding:16px; border-bottom:1px solid #f0f0f0; }
    .emp-item:last-child { border-bottom:none; }
    .emp-item:active { background:#eaf3ff; }
    .emp-item .nm { font-size:19px; font-weight:700; }
    .emp-item .inf { font-size:15px; color:#999; margin-top:2px; }
    .selected-emp { background:#eaf3ff; border:2px solid #185FA5; border-radius:14px; padding:16px; display:flex; justify-content:space-between; align-items:center; }
    .selected-emp .nm { font-size:20px; font-weight:800; color:#185FA5; }
    .selected-emp .chg { font-size:15px; color:#185FA5; text-decoration:underline; }
    .btn-primary { width:100%; min-height:56px; background:#185FA5; color:#fff; border:none; border-radius:14px; font-size:20px; font-weight:800; margin-top:4px; }
    .btn-primary:active { background:#12477c; }
    .btn-primary:disabled { background:#9bb6d2; }
    #app { display:none; flex-direction:column; height:100vh; }
    .app-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; background:#185FA5; color:#fff; }
    .app-header .title { font-size:20px; font-weight:800; }
    .app-header .who { font-size:14px; opacity:.9; margin-top:2px; }
    .bell-btn { background:rgba(255,255,255,.18); border:none; color:#fff; min-width:52px; min-height:52px; border-radius:14px; font-size:24px; display:flex; align-items:center; justify-content:center; }
    .bell-btn:active { background:rgba(255,255,255,.32); }
    .action-bar { display:flex; gap:10px; padding:12px 16px; border-bottom:1px solid #eef1f5; }
    .btn-ghost { flex:1; min-height:48px; background:#eef3f9; color:#185FA5; border:2px solid #d6e3f1; border-radius:12px; font-weight:700; font-size:16px; }
    .btn-ghost:active { background:#dde9f6; }
    .list { flex:1; overflow-y:auto; padding:14px 16px 90px; display:flex; flex-direction:column; gap:12px; }
    .card { background:#fff; border:2px solid #eef1f5; border-radius:16px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .card .top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .card .nm { font-size:19px; font-weight:800; }
    .card .dept { font-size:14px; color:#999; margin-left:6px; font-weight:500; }
    .chip { font-size:14px; font-weight:800; padding:5px 12px; border-radius:20px; white-space:nowrap; }
    .chip-wait { background:#E6F1FB; color:#185FA5; }
    .chip-ok { background:#EAF3DE; color:#3B6D11; }
    .chip-no { background:#FCEBEB; color:#A32D2D; }
    .card .meta { font-size:16px; color:#555; margin-top:10px; }
    .card .meta b { color:#1a1a1a; }
    .card .row2 { display:flex; justify-content:flex-end; margin-top:14px; }
    .btn-del { min-height:48px; min-width:96px; background:#fff; color:#A32D2D; border:2px solid #f0c9c9; border-radius:12px; font-weight:700; font-size:16px; padding:0 18px; }
    .btn-del:active { background:#fcebeb; }
    .empty { text-align:center; color:#aaa; padding:60px 20px; font-size:18px; line-height:1.7; }
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:flex-end; }
    .modal { background:#fff; width:100%; max-width:480px; margin:0 auto; border-radius:22px 22px 0 0; max-height:90vh; overflow-y:auto; padding:24px 22px 36px; }
    .modal h2 { font-size:22px; font-weight:800; margin-bottom:6px; }
    .modal .desc { font-size:16px; color:#666; margin-bottom:18px; }
    .step { display:flex; gap:14px; align-items:flex-start; padding:14px; background:#f6f8fb; border-radius:14px; margin-bottom:12px; }
    .step .num { flex-shrink:0; width:34px; height:34px; border-radius:50%; background:#185FA5; color:#fff; font-size:18px; font-weight:800; display:flex; align-items:center; justify-content:center; }
    .step .txt { font-size:17px; line-height:1.55; }
    .step .txt b { color:#185FA5; }
    .modal .note { font-size:15px; color:#A32D2D; background:#fcf0f0; border-radius:12px; padding:12px 14px; margin:8px 0 16px; }
    .modal .ok-banner { font-size:16px; color:#3B6D11; background:#eef7e0; border-radius:12px; padding:14px; margin-bottom:16px; font-weight:700; text-align:center; }
    .btn-close { width:100%; min-height:54px; background:#eef1f5; color:#333; border:none; border-radius:14px; font-weight:700; font-size:18px; margin-top:10px; }
    .guide-title { font-size:18px; font-weight:800; margin:18px 0 10px; color:#185FA5; }
    #install-bar { display:none; position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; padding:12px 16px; background:#fff; border-top:2px solid #eef1f5; box-shadow:0 -3px 12px rgba(0,0,0,.1); z-index:90; }
    #toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#262b33; color:#fff; padding:14px 22px; border-radius:14px; font-size:16px; display:none; z-index:200; max-width:90%; text-align:center; line-height:1.5; }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>불러오는 중...</p></div>

<div class="wrap" id="login-screen">
  <div class="logo">🏥 휴가 알림</div>
  <div class="sub">사번과 비밀번호를 입력하세요</div>
  <div>
    <div class="label">사번</div>
    <input id="sabun-input" type="text" inputmode="numeric" placeholder="본인 사번 (예: 5003402)" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('sabun-pw').focus()">
    <div style="height:18px"></div>
    <div class="label">비밀번호</div>
    <input id="sabun-pw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')App.doSabunLogin()">
    <div style="height:20px"></div>
    <button class="btn-primary" id="sabun-btn" onclick="App.doSabunLogin()">로그인</button>
  </div>
</div>

<div class="wrap" id="app">
  <div class="app-header">
    <div><div class="title">📋 대기 결재</div><div class="who" id="who"></div></div>
    <button class="bell-btn" onclick="App.openAlarmSetup()" title="알림 설정">🔔</button>
  </div>
  <div class="action-bar">
    <button class="btn-ghost" onclick="App.loadNotifs()">🔄 새로고침</button>
    <button class="btn-ghost" onclick="App.clearAll()">✓ 전체 읽음 처리</button>
  </div>
  <div class="list" id="notif-list"></div>
</div>

<div class="modal-bg" id="alarm-modal"><div class="modal" id="alarm-modal-inner"></div></div>

<div id="install-bar"><button class="btn-primary" style="margin:0;" onclick="App.doInstall()">📲 홈 화면에 추가 (앱처럼 쓰기)</button></div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyILWUloKwZ1tmxXmKaK-SyEZdpTnBX1uC-LDHYIz0I-3iKKNVbisGAxAnLaQZkkiKvgA/exec';
var FIREBASE_CONFIG = {
  apiKey: 'AIzaSyBSk1iZF22x4XVibZYAZ1xaHQyehqIoHDM',
  authDomain: 'dhu-leave-notify-db94c.firebaseapp.com',
  projectId: 'dhu-leave-notify-db94c',
  storageBucket: 'dhu-leave-notify-db94c.firebasestorage.app',
  messagingSenderId: '257549200977',
  appId: '1:257549200977:web:98074d868fab2d89af5270'
};
var VAPID_KEY = 'BPCmKdfsgJp0-JL2edCcbY5RVLOI6ZxHzihEgozbuaOiBryH_mFIB17HQltvWlu_qy_rfvJffZle3-r_MfY-H4A';

function api(payload) {
  return fetch(GAS_URL, { method:'POST', body: JSON.stringify(payload), redirect:'follow' }).then(function(r){ return r.json(); });
}

var STATUS_CHIP = { '대기':'chip-wait', '승인':'chip-ok', '반려':'chip-no', '취소':'chip-no' };

var App = {
  user: null, _emps: [], _selected: null, _curItems: [], _deferredPrompt: null,

  init: function() {
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(function(){}); }
    App.checkInstall();
    var saved = localStorage.getItem('pwaUser');
    if (saved) { try { App.user = JSON.parse(saved); App.showApp(); return; } catch(e){} }
    App.showLogin();
  },

  checkInstall: function() {
    var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
    if (isStandalone) { App.hideInstall(); return; }
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS || App._deferredPrompt) App.showInstall();
  },
  showInstall: function(){ var b=document.getElementById('install-bar'); if(b) b.style.display='block'; },
  hideInstall: function(){ var b=document.getElementById('install-bar'); if(b) b.style.display='none'; },
  doInstall: function() {
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (App._deferredPrompt) {
      App._deferredPrompt.prompt();
      App._deferredPrompt.userChoice.then(function(c){ if (c && c.outcome === 'accepted') App.hideInstall(); App._deferredPrompt = null; });
    } else if (isIOS) { App.showIosInstall(); }
    else { App.toast('브라우저 메뉴에서 "앱 설치" 또는 "홈 화면에 추가"를 눌러주세요.'); }
  },
  showIosInstall: function() {
    var inner = document.getElementById('alarm-modal-inner');
    var html = '<h2>📲 홈 화면에 추가</h2><div class="desc">아이폰은 아래 순서로 추가합니다.</div>';
    html += App.step(1, '사파리(Safari) 아래 가운데 <b>공유 버튼(□ 위에 ↑)</b>을 누릅니다.');
    html += App.step(2, '메뉴를 위로 올려 <b>"홈 화면에 추가"</b>를 누릅니다.');
    html += App.step(3, '오른쪽 위 <b>"추가"</b>를 누릅니다.');
    html += App.step(4, '홈 화면에 생긴 <b>"휴가알림"</b> 아이콘으로 들어옵니다.');
    html += '<div class="note">※ 크롬이 아니라 반드시 <b>사파리</b>에서 해야 합니다.</div>';
    html += '<button class="btn-close" onclick="App.closeAlarmSetup()">닫기</button>';
    inner.innerHTML = html;
    document.getElementById('alarm-modal').style.display = 'flex';
  },

  showLogin: function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    setTimeout(function(){ var el=document.getElementById('sabun-input'); if(el) el.focus(); }, 150);
  },
  loadEmps: function() {
    api({ action:'employees' }).then(function(d){
      if (!d.ok) { App.toast(d.error || '직원 목록을 불러오지 못했습니다.'); return; }
      var seen={}; App._emps = (d.employees || []).filter(function(e){ if(seen[e.sabun]) return false; seen[e.sabun]=true; return true; }); App.renderEmps(App._emps);
    }).catch(function(){ App.toast('네트워크 오류. 인터넷 연결을 확인해 주세요.'); });
  },
  filterEmp: function(q) {
    q = (q || '').trim();
    if (!q) { App.renderEmps(App._emps); return; }
    App.renderEmps(App._emps.filter(function(e){ return e.name.indexOf(q) > -1 || e.dept.indexOf(q) > -1; }));
  },
  renderEmps: function(list) {
    var el = document.getElementById('emp-list');
    if (!list || list.length === 0) { el.innerHTML = '<div class="emp-item"><span class="inf">검색 결과가 없습니다.</span></div>'; return; }
    el.innerHTML = list.slice(0, 50).map(function(e){
      return '<div class="emp-item" onclick="App.selectEmp(\'' + esc(e.sabun) + '\')"><div class="nm">' + esc(e.name) + '</div><div class="inf">' + esc(e.dept) + (e.position ? ' · ' + esc(e.position) : '') + '</div></div>';
    }).join('');
  },
  selectEmp: function(sabun) {
    var e = App._emps.filter(function(x){ return String(x.sabun) === String(sabun); })[0];
    if (!e) return;
    App._selected = e;
    document.getElementById('sel-name').textContent = e.name;
    document.getElementById('sel-info').textContent = e.dept + (e.position ? ' · ' + e.position : '');
    document.getElementById('step-select').style.display = 'none';
    document.getElementById('step-pw').style.display = 'block';
    setTimeout(function(){ document.getElementById('pw-input').focus(); }, 100);
  },
  resetSelect: function() {
    App._selected = null;
    document.getElementById('pw-input').value = '';
    document.getElementById('step-pw').style.display = 'none';
    document.getElementById('step-select').style.display = 'block';
  },
  showSabunLogin: function(){ document.getElementById('step-select').style.display='none'; document.getElementById('step-pw').style.display='none'; document.getElementById('step-sabun').style.display='block'; setTimeout(function(){var el=document.getElementById('sabun-input'); if(el) el.focus();},100); },
  showNameLogin: function(){ document.getElementById('step-sabun').style.display='none'; document.getElementById('step-pw').style.display='none'; document.getElementById('step-select').style.display='block'; },
  doSabunLogin: function(){
    var sabun=(document.getElementById('sabun-input').value||'').trim();
    var pw=document.getElementById('sabun-pw').value;
    if(!sabun){ App.toast('사번을 입력하세요.'); return; }
    if(!pw){ App.toast('비밀번호를 입력하세요.'); return; }
    var btn=document.getElementById('sabun-btn'); btn.disabled=true; btn.textContent='로그인 중...';
    api({ action:'login', sabun:sabun, pw:pw }).then(function(d){
      btn.disabled=false; btn.textContent='로그인';
      if(!d.ok){ App.toast(d.error||'로그인 실패'); return; }
      App.user={ sabun:d.sabun, name:d.name, dept:d.dept, position:d.position, isApprover:d.isApprover };
      localStorage.setItem('pwaUser', JSON.stringify(App.user));
      App.showApp();
    }).catch(function(){ btn.disabled=false; btn.textContent='로그인'; App.toast('네트워크 오류. 다시 시도해 주세요.'); });
  },
  logout: function(){ try{ localStorage.removeItem('pwaUser'); }catch(e){} App.closeAlarmSetup(); location.reload(); },
  doLogin: function() {
    if (!App._selected) return;
    var pw = document.getElementById('pw-input').value;
    if (!pw) { App.toast('비밀번호를 입력하세요.'); return; }
    var btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = '로그인 중...';
    api({ action:'login', sabun: App._selected.sabun, pw: pw }).then(function(d){
      btn.disabled = false; btn.textContent = '로그인';
      if (!d.ok) { App.toast(d.error || '로그인 실패'); return; }
      App.user = { sabun:d.sabun, name:d.name, dept:d.dept, position:d.position, isApprover:d.isApprover };
      localStorage.setItem('pwaUser', JSON.stringify(App.user));
      App.showApp();
    }).catch(function(){ btn.disabled=false; btn.textContent='로그인'; App.toast('네트워크 오류. 다시 시도해 주세요.'); });
  },
  showApp: function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.querySelector('#app .title').textContent = App.user.isApprover ? '📋 대기 결재' : '📋 내 휴가 신청';
    document.getElementById('who').textContent = App.user.name + ' 님 · ' + (App.user.dept || '');
    App.loadNotifs();
  },
  loadNotifs: function() {
    var el = document.getElementById('notif-list');
    el.innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto 14px"></div>불러오는 중...</div>';
    var action = App.user.isApprover ? 'pending' : 'myList';
    api({ action: action, sabun: App.user.sabun, position: App.user.position }).then(function(d){
      if (!d.ok) { el.innerHTML = '<div class="empty">' + esc(d.error || '불러오지 못했습니다.') + '</div>'; return; }
      App.renderNotifs(d.items || []);
    }).catch(function(){ el.innerHTML = '<div class="empty">네트워크 오류로<br>목록을 불러오지 못했습니다.<br><br>잠시 후 새로고침을 눌러주세요.</div>'; });
  },
  renderNotifs: function(items) {
    var el = document.getElementById('notif-list');
    var dismissed = App.getDismissed();
    items = (items || []).filter(function(it){ return dismissed.indexOf(String(it.id)) === -1; });
    App._curItems = items;
    if (items.length === 0) { el.innerHTML = '<div class="empty">📭 대기 중인 결재가 없습니다.</div>'; return; }
    el.innerHTML = items.map(function(it){
      var st = it.status || '대기';
      var chip = STATUS_CHIP[st] || 'chip-wait';
      var period = esc(it.startDate || '');
      if (it.endDate && it.endDate !== it.startDate) period += ' ~ ' + esc(it.endDate);
      else if (it.startType) period += ' ' + esc(it.startType);
      return '<div class="card"><div class="top"><div><span class="nm">' + esc(it.name || App.user.name || '신청') + '</span><span class="dept">' + esc(it.dept || '') + '</span></div><span class="chip ' + chip + '">' + esc(st) + '</span></div><div class="meta">휴가종류 : <b>' + esc(it.leaveType || '-') + '</b></div><div class="meta">기간 : <b>' + period + '</b></div><div class="row2"><button class="btn-del" onclick="App.dismiss(\'' + esc(String(it.id)) + '\', this)">알림 지우기</button></div></div>';
    }).join('');
  },
  getDismissed: function(){ try { return JSON.parse(localStorage.getItem('dismissed_' + App.user.sabun) || '[]'); } catch(e){ return []; } },
  saveDismissed: function(arr){ try { localStorage.setItem('dismissed_' + App.user.sabun, JSON.stringify(arr)); } catch(e){} },
  dismiss: function(id, btn) {
    var arr = App.getDismissed();
    if (arr.indexOf(String(id)) === -1) arr.push(String(id));
    App.saveDismissed(arr);
    var card = btn.closest('.card'); if (card) card.remove();
    App.checkEmpty();
  },
  clearAll: function() {
    if (!(App._curItems && App._curItems.length)) { App.toast('지울 알림이 없습니다.'); return; }
    if (!confirm('지금 보이는 알림을 모두 지울까요?\n실제 결재 내용은 그대로 유지됩니다.')) return;
    var arr = App.getDismissed();
    App._curItems.forEach(function(it){ if (arr.indexOf(String(it.id)) === -1) arr.push(String(it.id)); });
    App.saveDismissed(arr);
    App.renderNotifs([]);
    App.toast('모두 지웠습니다.');
  },
  checkEmpty: function(){ var el = document.getElementById('notif-list'); if (!el.querySelector('.card')) el.innerHTML = '<div class="empty">📭 대기 중인 결재가 없습니다.</div>'; },

  openAlarmSetup: function(){ document.getElementById('alarm-modal-inner').innerHTML = App.buildAlarmHTML() + '<div style="text-align:center;margin-top:20px;"><span onclick="App.logout()" style="color:#999;font-size:15px;text-decoration:underline;cursor:pointer;">로그아웃</span></div>'; document.getElementById('alarm-modal').style.display = 'flex'; },
  closeAlarmSetup: function(){ document.getElementById('alarm-modal').style.display = 'none'; },
  buildAlarmHTML: function() {
    var supported = ('Notification' in window) && ('serviceWorker' in navigator) && ('PushManager' in window);
    var perm = ('Notification' in window) ? Notification.permission : 'unsupported';
    var ua = navigator.userAgent;
    var isIOS = /iphone|ipad|ipod/i.test(ua);
    var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
    var html = '<h2>🔔 알림 설정</h2>';
    if (!supported && !isIOS) { html += '<div class="note">이 브라우저는 알림(푸시)을 지원하지 않습니다.<br>아래 권장 브라우저로 다시 접속해 주세요.</div>' + App.guideWindowsBrowsers() + '<button class="btn-close" onclick="App.closeAlarmSetup()">닫기</button>'; return html; }
    if (isIOS && !isStandalone) {
      html += '<div class="desc">아이폰·아이패드는 <b>홈 화면에 추가</b>해야만 알림을 받을 수 있습니다.</div><div class="guide-title">📱 아이폰 홈 화면 추가</div>';
      html += App.step(1, '사파리 아래 가운데 <b>공유 버튼(□ 위에 ↑)</b>을 누릅니다.');
      html += App.step(2, '<b>"홈 화면에 추가"</b>를 누릅니다.');
      html += App.step(3, '오른쪽 위 <b>"추가"</b>를 누릅니다.');
      html += App.step(4, '홈 화면 <b>"휴가알림"</b> 아이콘으로 들어와 이 <b>🔔</b>를 다시 눌러주세요.');
      html += '<div class="note">※ 반드시 <b>사파리</b>에서 추가해야 합니다.</div><button class="btn-close" onclick="App.closeAlarmSetup()">닫기</button>'; return html;
    }
    if (perm === 'granted') { html += '<div class="ok-banner">✅ 알림이 켜져 있습니다.<br>승인·반려 시 휴대폰으로 알려드립니다.</div><button class="btn-primary" onclick="App.enablePush()">알림 다시 등록하기</button><button class="btn-close" onclick="App.closeAlarmSetup()">닫기</button>'; return html; }
    if (perm === 'default') { html += '<div class="desc">아래 버튼을 누르면 "알림을 허용하시겠어요?" 물음이 나옵니다. <b>허용</b>을 눌러주세요.</div><button class="btn-primary" onclick="App.enablePush()">알림 허용하기</button><div style="height:10px"></div><button class="btn-close" onclick="App.closeAlarmSetup()">닫기</button>'; return html; }
    html += '<div class="note">현재 알림이 <b>차단</b>되어 있습니다.<br>아래 방법으로 차단을 풀어주세요.</div>' + App.guideByBrowser(ua) + '<div class="desc" style="margin-top:14px">👉 설정을 바꾼 뒤 이 <b>🔔</b>를 다시 눌러주세요.</div><button class="btn-close" onclick="App.closeAlarmSetup()">닫기</button>';
    return html;
  },
  step: function(n, txt){ return '<div class="step"><div class="num">' + n + '</div><div class="txt">' + txt + '</div></div>'; },
  guideByBrowser: function(ua) {
    if (/SamsungBrowser/i.test(ua)) return '<div class="guide-title">📱 삼성 인터넷</div>' + App.step(1,'주소창 왼쪽 <b>자물쇠 🔒</b>를 누릅니다.') + App.step(2,'<b>"권한"</b> 또는 <b>"알림"</b>을 누릅니다.') + App.step(3,'<b>"허용"</b>으로 바꿉니다.');
    if (/Edg/i.test(ua)) return '<div class="guide-title">📱 엣지(Edge)</div>' + App.step(1,'주소창 왼쪽 <b>자물쇠 🔒</b>를 누릅니다.') + App.step(2,'<b>"이 사이트의 권한"</b> → <b>"알림"</b>.') + App.step(3,'<b>"허용"</b>으로 바꿉니다.');
    if (/Firefox/i.test(ua)) return '<div class="guide-title">📱 파이어폭스</div>' + App.step(1,'주소창 왼쪽 <b>자물쇠 🔒</b>를 누릅니다.') + App.step(2,'<b>"권한 수정"</b>에서 알림을 찾습니다.') + App.step(3,'<b>"허용"</b>으로 바꿉니다.');
    return '<div class="guide-title">📱 크롬(Chrome)</div>' + App.step(1,'주소창 왼쪽 <b>자물쇠 🔒</b>(또는 ⓘ)를 누릅니다.') + App.step(2,'<b>"권한"</b> → <b>"알림"</b>을 누릅니다.') + App.step(3,'<b>"허용"</b>으로 바꿉니다.') + App.step(4,'안 보이면 휴대폰 <b>설정 → 앱 → Chrome → 알림</b>을 켜주세요.');
  },
  guideWindowsBrowsers: function(){ return '<div class="guide-title">💻 컴퓨터(윈도우)</div>' + App.step(1,'<b>크롬</b> 또는 <b>엣지</b> 최신 버전을 사용하세요.') + App.step(2,'인터넷 익스플로러(IE)는 <b>지원하지 않습니다.</b>') + App.step(3,'주소창에 <b>chrome://settings/content/notifications</b> 입력 시 알림 설정으로 바로 갑니다.'); },

  enablePush: function() {
    if (!('Notification' in window)) { App.toast('이 브라우저는 알림을 지원하지 않습니다.'); return; }
    Notification.requestPermission().then(function(p){
      if (p === 'granted') { App.registerToken(); App.toast('알림이 켜졌습니다.'); App.openAlarmSetup(); }
      else if (p === 'denied') { App.openAlarmSetup(); }
    });
  },
  registerToken: function() {
    if (!FIREBASE_CONFIG.appId || FIREBASE_CONFIG.appId.indexOf('YOUR_') === 0) { App.toast('Firebase 설정이 비어 있습니다.'); return; }
    try {
      if (typeof firebase === 'undefined') { App.toast('알림 모듈 로딩 실패. 새로고침 후 다시 시도해 주세요.'); return; }
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      var messaging = firebase.messaging();
      navigator.serviceWorker.register('firebase-messaging-sw.js', { scope: 'firebase-cloud-messaging-push-scope' })
        .then(function(reg){ return messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg }); })
        .then(function(token){ if (token) { App.saveTokenToFirestore(token); } else { App.toast('토큰을 받지 못했습니다. 다시 시도해 주세요.'); } })
        .catch(function(err){ console.error('[푸시] 토큰 발급 실패:', err); App.toast('알림 등록 실패: ' + (err && (err.code || err.message) ? (err.code || err.message) : '알 수 없는 오류')); });
    } catch (e) { console.error('[푸시] 오류:', e); App.toast('알림 오류: ' + e.message); }
  },
  saveTokenToFirestore: function(token) {
    var base = 'https://firestore.googleapis.com/v1/projects/' + FIREBASE_CONFIG.projectId + '/databases/(default)/documents';
    var url = base + '/fcm_tokens/' + encodeURIComponent(App.user.sabun) + '?key=' + FIREBASE_CONFIG.apiKey;
    var doc = { fields: {
      token: { stringValue: String(token) },
      name: { stringValue: App.user.name || '' },
      dept: { stringValue: App.user.dept || '' },
      updatedAt: { stringValue: new Date().toISOString() }
    }};
    fetch(url, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(doc) })
      .then(function(r){ if (r.ok) { App.toast('알림이 등록되었습니다.'); } else { r.text().then(function(t){ console.error('[푸시] 저장실패', r.status, t); }); App.toast('알림 저장 실패 (' + r.status + ')'); } })
      .catch(function(e){ console.error('[푸시] 저장 네트워크 오류', e); App.toast('알림 저장 중 네트워크 오류'); });
  },
  toast: function(msg) {
    var el = document.getElementById('toast');
    el.innerHTML = msg; el.style.display = 'block';
    clearTimeout(App._t);
    App._t = setTimeout(function(){ el.style.display = 'none'; }, 3500);
  }
};

function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); App._deferredPrompt = e; App.checkInstall(); });
window.addEventListener('appinstalled', function(){ App.hideInstall(); });

App.init();
</script>
</body>
</html>
