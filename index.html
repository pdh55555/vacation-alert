<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="휴가알림">
  <title>휴가 신청 현황</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    /* ── 기본 리셋 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }

    /* ── 로딩 화면 ── */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    #loading .spinner { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #888; }

    /* ── 로그인 화면 ── */
    #login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; padding: 24px; }
    #login-screen .app-title { font-size: 22px; font-weight: 600; color: #1a1a1a; }
    #login-screen .app-sub { font-size: 14px; color: #888; text-align: center; line-height: 1.5; }
    /* 검색 입력 */
    #emp-search { width: 100%; max-width: 340px; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 15px; outline: none; }
    #emp-search:focus { border-color: #185FA5; }
    /* 직원 목록 */
    #emp-list { width: 100%; max-width: 340px; max-height: 320px; overflow-y: auto; border: 1px solid #ececec; border-radius: 12px; background: #fff; }
    #emp-list:empty { display: none; }
    .emp-item { padding: 12px 16px; cursor: pointer; border-bottom: 0.5px solid #f0f0f0; display: flex; align-items: center; gap: 10px; transition: background 0.1s; }
    .emp-item:last-child { border-bottom: none; }
    .emp-item:active { background: #f0f6ff; }
    .emp-item .emp-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .emp-item .emp-info { font-size: 12px; color: #aaa; }

    /* ── 메인 앱 ── */
    #app { display: none; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; background: #fff; }

    /* ── 헤더 ── */
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; background: #fff; border-bottom: 0.5px solid #eee; }
    .app-header .title { font-size: 17px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .push-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; cursor: pointer; }
    .push-toggle .bell-icon { font-size: 20px; }
    .push-toggle.on .bell-icon { color: #185FA5; }

    /* ── 탭 ── */
    .tab-bar { display: flex; border-bottom: 0.5px solid #eee; }
    .tab-item { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; color: #aaa; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-item.active { color: #185FA5; border-bottom-color: #185FA5; }

    /* ── 리스트 ── */
    .list-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .list-container::-webkit-scrollbar { display: none; }

    /* ── 카드 아이템 ── */
    .leave-item { background: #fff; border-radius: 12px; border: 0.5px solid #ececec; padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.1s; }
    .leave-item:active { background: #f8f8f8; }

    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-wait { background: #378ADD; }
    .dot-ok   { background: #639922; }
    .dot-no   { background: #E24B4A; }
    .dot-ing  { background: #EF9F27; }

    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .avatar-blue   { background: #E6F1FB; color: #185FA5; }
    .avatar-green  { background: #EAF3DE; color: #3B6D11; }
    .avatar-red    { background: #FCEBEB; color: #A32D2D; }
    .avatar-purple { background: #EEEDFE; color: #3C3489; }
    .avatar-amber  { background: #FAEEDA; color: #633806; }

    .item-body { flex: 1; min-width: 0; }
    .item-row1 { display: flex; align-items: center; gap: 6px; }
    .item-name { font-size: 14px; font-weight: 600; color: #1a1a1a; white-space: nowrap; }
    .item-dept { font-size: 11px; color: #aaa; white-space: nowrap; }
    .item-dates { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chip { flex-shrink: 0; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .chip-wait { background: #E6F1FB; color: #185FA5; }
    .chip-ok   { background: #EAF3DE; color: #3B6D11; }
    .chip-no   { background: #FCEBEB; color: #A32D2D; }
    .chip-ing  { background: #FAEEDA; color: #633806; }

    /* ── 빈 화면 ── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 8px; color: #bbb; font-size: 14px; }
    .empty svg { opacity: 0.3; }

    /* ── 알림 권한 배너 ── */
    #push-banner { display: none; margin: 10px 12px 0; background: #E6F1FB; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #185FA5; cursor: pointer; }
    #push-banner span { font-weight: 600; }

    /* ── 에러 토스트 ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; display: none; z-index: 999; white-space: nowrap; }
  </style>
</head>
<body>

<!-- 로딩 -->
<div id="loading">
  <div class="spinner"></div>
  <p>로그인 확인 중...</p>
</div>

<!-- 로그인 -->
<div id="login-screen">
  <div class="app-title">휴가 신청 현황</div>
  <div class="app-sub" id="login-sub">이름을 검색하여 선택하세요</div>
  <input id="emp-search" type="text" placeholder="이름 검색..." oninput="App.filterEmployees(this.value)" autocomplete="off" style="display:none">
  <div id="emp-list"></div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <div class="app-header">
    <div class="title" id="header-title">휴가 신청 현황</div>
    <div class="header-right">
      <div class="push-toggle" id="push-toggle" onclick="App.togglePush()" title="알림 설정">
        <span class="bell-icon">🔔</span>
      </div>
    </div>
  </div>

  <!-- 결재권자 전용 탭 -->
  <div class="tab-bar" id="tab-bar" style="display:none">
    <div class="tab-item active" onclick="App.switchTab('approver')">결재 목록</div>
    <div class="tab-item" onclick="App.switchTab('mine')">내 신청</div>
  </div>

  <!-- 알림 허용 유도 배너 -->
  <div id="push-banner" onclick="App.requestPush()">
    🔔 <span>알림을 허용</span>하면 승인 즉시 알려드립니다.
  </div>

  <!-- 신청 목록 -->
  <div class="list-container" id="list-container"></div>
</div>

<!-- 에러 토스트 -->
<div id="toast"></div>

<script>
// ────────────────────────────────────────────────────────────
// [설정] GAS 웹앱 배포 URL로 교체 필요
// ────────────────────────────────────────────────────────────
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxcQ48rOm7D6iWP6HXbnqWRdoKurbqkZF5Gbu29RHJkkiectiDbpiGC4bsQAg5p1Maiow/exec';

// 알림 클릭 시 열릴 링크
var DEEP_LINK = 'https://m.site.naver.com/25PFE';

// Firebase 설정 (Firebase 콘솔에서 복사)
var FIREBASE_CONFIG = {
  apiKey: 'YOUR_API_KEY',
  projectId: 'YOUR_PROJECT_ID',
  messagingSenderId: 'YOUR_SENDER_ID',
  appId: 'YOUR_APP_ID'
};
var VAPID_KEY = 'BPCmKdfsgJp0-JL2edCcbY5RVLOI6ZxHzihEgozbuaOiBryH_mFIB17HQltvWlu_qy_rfvJffZle3-r_MfY-H4A';

// ────────────────────────────────────────────────────────────
// 아바타 색상 사이클 (이름 첫 글자 기준)
// ───────────────────────────────────────────────────────────────
var AVATAR_CLASSES = ['avatar-blue','avatar-green','avatar-purple','avatar-amber','avatar-red'];
function avatarClass(name) {
  var code = (name || '').charCodeAt(0) || 0;
  return AVATAR_CLASSES[code % AVATAR_CLASSES.length];
}

// ────────────────────────────────────────────────────────────
// 상태 → 닷/칩 클래스 매핑
// ────────────────────────────────────────────────────────────
var STATUS_MAP = {
  '대기':   { dot: 'dot-wait', chip: 'chip-wait', label: '대기' },
  '진행중': { dot: 'dot-ing',  chip: 'chip-ing',  label: '진행' },
  '승인':   { dot: 'dot-ok',   chip: 'chip-ok',   label: '승인' },
  '반려':   { dot: 'dot-no',   chip: 'chip-no',   label: '반려' }
};

// ────────────────────────────────────────────────────────────
// 날짜 + 구분 표시 문자열
// ────────────────────────────────────────────────────────────
function buildDateStr(item) {
  var s = item.startDate + ' ' + (item.startType || '');
  if (item.endDate && item.endDate !== item.startDate) {
    s += ' ~ ' + item.endDate;
  }
  s += ' · ' + (item.leaveType || '');
  return s.trim();
}

// ────────────────────────────────────────────────────────────
// 단일 카드 HTML 생성
// ────────────────────────────────────────────────────────────
function buildItemHTML(item) {
  var st = STATUS_MAP[item.status] || STATUS_MAP['대기'];
  var initial = (item.name || '?').charAt(0);
  return [
    '<div class="leave-item" onclick="App.openLink()">',
      '<div class="dot ' + st.dot + '"></div>',
      '<div class="avatar ' + avatarClass(item.name) + '">' + initial + '</div>',
      '<div class="item-body">',
        '<div class="item-row1">',
          '<span class="item-name">' + item.name + '</span>',
          '<span class="item-dept">' + item.dept + '</span>',
        '</div>',
        '<div class="item-dates">' + buildDateStr(item) + '</div>',
      '</div>',
      '<span class="chip ' + st.chip + '">' + st.label + '</span>',
    '</div>'
  ].join('');
}

// ────────────────────────────────────────────────────────────
// 앱 메인 로직
// ────────────────────────────────────────────────────────────
var App = {
  user: null,
  isApprover: false,
  currentTab: 'approver',  // 'approver' | 'mine'
  pushEnabled: false,
  _allEmployees: [],  // 직원 목록 캐시

  // ── 초기화 ──
  init: function() {
    console.log('[App.init] 시작');
    // Service Worker 등록
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) { console.log('[SW] 등록 완료:', reg.scope); })
        .catch(function(err) { console.error('[SW] 등록 실패:', err); });
    }
    // 저장된 이메일로 자동 로그인 시도
    var savedEmail = sessionStorage.getItem('authEmail');
    if (savedEmail) {
      App.checkAuth(savedEmail);
    } else {
      App.showLogin();
    }
  },

  // ── 인증 확인 ──
  checkAuth: function(email) {
    console.log('[App.checkAuth] GAS 인증 확인, email:', email);
    fetch(GAS_URL + '?action=checkAuth&email=' + encodeURIComponent(email || ''))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        console.log('[App.checkAuth] 응답:', JSON.stringify(data));
        if (data.authenticated) {
          sessionStorage.setItem('authEmail', data.email);
          App.user = data;
          App.isApprover = data.isApprover;
          App.showApp();
        } else {
          sessionStorage.removeItem('authEmail');
          App.showLogin();
        }
      })
      .catch(function(err) {
        console.error('[App.checkAuth] 오류:', err);
        App.showLogin();
      });
  },

  // ── 로그인 화면 ‒ 직원 목록 로드 ──
  loadEmployees: function() {
    document.getElementById('login-sub').textContent = '직원 목록을 불러오는 중...';
    fetch(GAS_URL + '?action=getEmployees')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error || !data.employees) {
          document.getElementById('login-sub').textContent = '직원 목록을 불러올 수 없습니다. 잠시 후 다시 시도하세요.';
          return;
        }
        App._allEmployees = data.employees;
        document.getElementById('login-sub').textContent = '이름을 검색하여 선택하세요';
        document.getElementById('emp-search').style.display = 'block';
        document.getElementById('emp-search').focus();
        App.renderEmployeeList(data.employees);
      })
      .catch(function(err) {
        console.error('[App.loadEmployees] 오류:', err);
        document.getElementById('login-sub').textContent = '네트워크 오류. 다시 시도해 주세요.';
      });
  },

  // ── 직원 검색 필터 ──
  filterEmployees: function(query) {
    var q = (query || '').trim();
    if (!q) {
      App.renderEmployeeList(App._allEmployees);
      return;
    }
    var filtered = App._allEmployees.filter(function(emp) {
      return emp.name.indexOf(q) >= 0 || emp.dept.indexOf(q) >= 0;
    });
    App.renderEmployeeList(filtered);
  },

  // ── 직원 목록 렌더링 ──
  renderEmployeeList: function(employees) {
    var list = document.getElementById('emp-list');
    if (!employees || employees.length === 0) {
      list.innerHTML = '<div class="emp-item"><span class="emp-info">검색 결과 없음</span></div>';
      return;
    }
    list.innerHTML = employees.map(function(emp) {
      return '<div class="emp-item" onclick="App.selectEmployee(\'' +
        emp.email.replace(/'/g, "\\'") + '\',\'' +
        emp.name.replace(/'/g, "\\'") + '\')">' +
        '<div><div class="emp-name">' + emp.name + '</div>' +
        '<div class="emp-info">' + emp.dept + (emp.position ? ' · ' + emp.position : '') + '</div></div>' +
        '</div>';
    }).join('');
  },

  // ── 직원 선택 → 인증 확인 ──
  selectEmployee: function(email, name) {
    console.log('[App.selectEmployee]', name, email);
    document.getElementById('login-sub').textContent = name + ' 님으로 로그인 중...';
    document.getElementById('emp-search').style.display = 'none';
    document.getElementById('emp-list').innerHTML = '';
    App.checkAuth(email);
  },

  // ── 화면 전환 ──
  showApp: function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // 결재권자이면 탭 표시
    if (App.isApprover) {
      document.getElementById('tab-bar').style.display = 'flex';
      document.getElementById('header-title').textContent = '결재 목록';
    } else {
      document.getElementById('header-title').textContent = '내 휴가 현황';
    }

    // 알림 배너 표시 여부 확인
    App.checkPushStatus();

    // 목록 로드
    App.loadList();
  },

  showLogin: function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    // 직원 목록이 아직 없으면 로드
    if (App._allEmployees.length === 0) {
      App.loadEmployees();
    }
  },

  // ── 탭 전환 ──
  switchTab: function(tab) {
    App.currentTab = tab;
    document.querySelectorAll('.tab-item').forEach(function(el, i) {
      el.classList.toggle('active', (i === 0 && tab === 'approver') || (i === 1 && tab === 'mine'));
    });
    App.loadList();
  },

  // ── 목록 로드 ──
  loadList: function() {
    var container = document.getElementById('list-container');
    container.innerHTML = '<div class="empty"><div class="spinner" style="width:24px;height:24px;border-width:2px"></div></div>';

    var action = (!App.isApprover || App.currentTab === 'mine') ? 'getMyList' : 'getList';
    console.log('[App.loadList] action:', action);

    // GAS API 호출 (재시도 1회) — email 파라미터 포함
    var emailParam = App.user && App.user.email ? '&email=' + encodeURIComponent(App.user.email) : '';
    App._fetchWithRetry(GAS_URL + '?action=' + action + emailParam, 2)
      .then(function(data) {
        console.log('[App.loadList] 응답 건수:', (data.items || []).length);
        App.renderList(data.items || []);
      })
      .catch(function(err) {
        console.error('[App.loadList] 오류:', err);
        container.innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.<br>잠시 후 다시 시도해 주세요.</div>';
      });
  },

  // ── 목록 렌더링 ──
  renderList: function(items) {
    var container = document.getElementById('list-container');
    if (!items || items.length === 0) {
      container.innerHTML = '<div class="empty">📋 신청 내역이 없습니다.</div>';
      return;
    }
    container.innerHTML = items.map(buildItemHTML).join('');
  },

  // ── 항목 클릭 → 외부 링크 ──
  openLink: function() {
    window.open(DEEP_LINK, '_blank');
  },

  // ── 알림 상태 확인 (실제 구독 여부 기준) ──
  checkPushStatus: function() {
    if (!('Notification' in window) || !('serviceWorker' in navigator)) return;

    var perm = Notification.permission;
    if (perm === 'denied') {
      // 차단됨 - 배너/토글 모두 off 상태 유지
      App.pushEnabled = false;
      return;
    }

    // 실제 push 구독 여부 확인
    navigator.serviceWorker.ready.then(function(reg) {
      reg.pushManager.getSubscription().then(function(sub) {
        if (sub && perm === 'granted') {
          App.pushEnabled = true;
          document.getElementById('push-toggle').classList.add('on');
          document.getElementById('push-banner').style.display = 'none';
        } else if (perm === 'default') {
          App.pushEnabled = false;
          document.getElementById('push-banner').style.display = 'block';
        }
      });
    });
  },

  // ── 알림 켜기/끄기 토글 ──
  togglePush: function() {
    if (App.pushEnabled) {
      // 끄기: 구독 해지 + 서버 토큰 삭제
      App.disablePush();
    } else {
      if (!('Notification' in window)) {
        App.showToast('이 브라우저는 알림을 지원하지 않습니다.');
        return;
      }
      if (Notification.permission === 'denied') {
        App.showPushDeniedGuide();
      } else {
        App.requestPush();
      }
    }
  },

  // ── 알림 끄기: 구독 해지 + 서버 토큰 삭제 ──
  disablePush: function() {
    App.pushEnabled = false;
    document.getElementById('push-toggle').classList.remove('on');

    // 서비스워커 구독 해지
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(function(reg) {
        reg.pushManager.getSubscription().then(function(sub) {
          if (sub) {
            sub.unsubscribe().then(function() {
              console.log('[App.disablePush] 구독 해지 완료');
            });
          }
        });
      });
    }

    // 서버(GAS)에서 FCM 토큰 삭제
    if (App.user && App.user.email) {
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'deleteFcmToken', email: App.user.email })
      }).then(function(r) { return r.json(); })
        .then(function(d) { console.log('[App.disablePush] 토큰 삭제:', d); })
        .catch(function(e) { console.error('[App.disablePush] 토큰 삭제 실패:', e); });
    }

    App.showToast('알림이 꺼졌습니다.');
  },

  // ── 알림 차단 상태 안내 (브라우저/OS별 맞춤) ──
  showPushDeniedGuide: function() {
    var ua = navigator.userAgent;
    var guide = '';
    if (/SamsungBrowser/i.test(ua)) {
      guide = '삼성 브라우저 → ⋮ 메뉴 → 설정 → 사이트 및 다운로드 → 사이트 권한 → 알림 → 이 사이트 허용';
    } else if (/android/i.test(ua)) {
      guide = '주소창 왼쪽 자물쇠(🔒) 탭 → 사이트 설정 → 알림 → 허용';
    } else if (/iphone|ipad/i.test(ua)) {
      guide = '설정 앱 → Safari → 고급 → 웹 푸시 알림 → 이 사이트 허용\n※ 홈 화면에 추가된 앱에서만 작동합니다.';
    } else if (/Edg/i.test(ua)) {
      guide = '주소창 자물쇠(🔒) → 권한 → 알림 → 허용';
    } else {
      guide = '주소창 왼쪽 자물쇠(🔒) 클릭 → 사이트 설정 → 알림 → 허용';
    }
    App.showToast('알림이 차단되어 있습니다. ' + guide);
    // 모바일은 토스트가 잘릴 수 있으므로 alert도 함께
    if (/mobile|android|iphone|ipad/i.test(ua)) {
      setTimeout(function() { alert('알림 허용 방법\n\n' + guide); }, 300);
    }
  },

  // ── 알림 권한 요청 + FCM 토큰 저장 ──
  requestPush: function() {
    if (!('Notification' in window)) {
      App.showToast('이 브라우저는 알림을 지원하지 않습니다.');
      return;
    }

    Notification.requestPermission().then(function(permission) {
      console.log('[App.requestPush] 권한 결과:', permission);
      document.getElementById('push-banner').style.display = 'none';

      if (permission === 'granted') {
        App.pushEnabled = true;
        document.getElementById('push-toggle').classList.add('on');
        App.saveFcmToken();
      } else if (permission === 'denied') {
        App.showPushDeniedGuide();
      }
    });
  },

  // ── FCM 토큰 발급 및 GAS에 저장 ──
  saveFcmToken: function() {
    if (!('serviceWorker' in navigator)) return;

    navigator.serviceWorker.ready.then(function(reg) {
      // Firebase Messaging SDK 필요 (sw.js에서 처리)
      // 여기서는 push 구독 방식 사용
      reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: App._urlBase64ToUint8Array(VAPID_KEY)
      }).then(function(sub) {
        var token = JSON.stringify(sub);
        console.log('[App.saveFcmToken] 구독 완료');

        // GAS에 토큰 저장
        fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'saveFcmToken', token: token, email: App.user ? App.user.email : '' })
        }).then(function(r) { return r.json(); })
          .then(function(d) { console.log('[App.saveFcmToken] 저장 결과:', d); })
          .catch(function(e) { console.error('[App.saveFcmToken] 저장 실패:', e); });
      }).catch(function(err) {
        console.error('[App.saveFcmToken] 구독 실패:', err);
      });
    });
  },

  // ── fetch 재시도 유틸 ──
  _fetchWithRetry: function(url, retries) {
    return fetch(url).then(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).catch(function(err) {
      if (retries > 1) {
        console.warn('[_fetchWithRetry] 재시도...', err.message);
        return new Promise(function(resolve) { setTimeout(resolve, 1500); })
          .then(function() { return App._fetchWithRetry(url, retries - 1); });
      }
      throw err;
    });
  },

  // ── VAPID 키 변환 유틸 ──
  _urlBase64ToUint8Array: function(base64String) {
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var rawData = window.atob(base64);
    return new Uint8Array(Array.from(rawData).map(function(c) { return c.charCodeAt(0); }));
  },

  // ── 토스트 메시지 ──
  showToast: function(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
  }
};

// 앱 시작
App.init();
</script>
</body>
</html>
